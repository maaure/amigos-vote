services:
  next-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* é resolvido em build time (define o basePath do Next)
        - NEXT_PUBLIC_BASE_PATH=${NEXT_PUBLIC_BASE_PATH:-}
    container_name: inimigo-app
    restart: unless-stopped
    ports:
      # Apenas loopback — o acesso público vem pelo Caddy (ver docker-compose.prod.yml)
      - "127.0.0.1:3000:3000"
    networks:
      - inimigo-net
    depends_on:
      db:
        condition: service_healthy
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - DB_ADDRESS=${DB_ADDRESS}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXT_PUBLIC_BASE_PATH=${NEXT_PUBLIC_BASE_PATH:-}
      - GITHUB_ID=${GITHUB_ID}
      - GITHUB_SECRET=${GITHUB_SECRET}
      - GOOGLE_ID=${GOOGLE_ID}
      - GOOGLE_SECRET=${GOOGLE_SECRET}

  db:
    image: postgres:15-alpine
    container_name: inimigo-db
    restart: unless-stopped
    ports:
      # NUNCA exponha o Postgres pra internet pública
      - "127.0.0.1:5432:5432"
    networks:
      - inimigo-net
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  inimigo-net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
